# ==========================================
# CORE SETTINGS
# ==========================================
set -g default-terminal "screen-256color"  # More portable across terminal/ssh hops
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB" # True Color support
set -g focus-events on                  # Forward focus changes so nvim can detect pane/window switches

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -g base-index 1              # Start windows at 1
set -g renumber-windows on       # Renumber windows when one is closed
set -g set-clipboard on          # Use system clipboard
set-window-option -g mode-keys vi # Use Vim keys in copy mode

# Create the default window set for each new session.
set-hook -g after-new-session {
    rename-window editor
    new-window -d -n ai 'zsh -lic codex'
    split-window -h -t ai 'zsh -lic agy'
    set-window-option -t ai remain-on-exit on
    new-window -d -n server
    select-window -t 1
}

# ==========================================
# KEYBINDINGS
# ==========================================
# Split panes
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind c
bind c new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"

# window management
# Move windows left and right
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Reload config
unbind r
bind r source-file ~/.config/tmux/.tmux.conf \; display-message "tmux config reloaded"

# Resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Kill panes
unbind x
bind-key x confirm-before -p "Kill all windows in session #S? (y/n)" kill-session
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session
bind q kill-pane

# Copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# ==========================================
# PLUGINS (TPM)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin Configuration
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# Dotbar Configuration
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-right "true"
set -g @tmux-dotbar-status-right "%H:%M"
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-fg "#949392"
set -g @tmux-dotbar-fg-prefix "#F2F0EF"
set -g @tmux-dotbar-fg-current "#F2F0EF"
set -g @tmux-dotbar-maximized-icon "󰊓"
set -g @tmux-dotbar-bold-status true
set -g @tmux-dotbar-bold-current-window false

# ==========================================
# INITIALIZE TPM (Keep at the very bottom)
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
